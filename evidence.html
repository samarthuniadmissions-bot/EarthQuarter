<!DOCTYPE html><html><body><h1>Complete Your Earthquarter</h1><input type='file' id='evidenceFile' accept='.jpg,.jpeg,.png,.heic'><button id='submitEvidence'>Submit Evidence</button><div id='msg'></div><script>submitEvidence.onclick=()=>{const f=evidenceFile.files[0];if(!f)return alert('Select file');const e=JSON.parse(localStorage.getItem('earthquarterEvidence')||'[]');e.push({fileName:f.name,uploadDate:new Date().toISOString(),status:'Submitted'});localStorage.setItem('earthquarterEvidence',JSON.stringify(e));let u=JSON.parse(localStorage.getItem('earthquarterUser')||'{}');u.evidenceSubmitted=(u.evidenceSubmitted||0)+1;u.sessionsCompleted=(u.sessionsCompleted||0)+1;u.badge=u.sessionsCompleted>=30?'Gold Earthkeeper':u.sessionsCompleted>=15?'Silver Earthkeeper':u.sessionsCompleted>=5?'Bronze Earthkeeper':'None';localStorage.setItem('earthquarterUser',JSON.stringify(u));msg.innerHTML='Evidence submitted successfully';}</script></body></html>
